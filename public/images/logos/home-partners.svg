<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4 -4 284 75">
  <!-- Top section: top bar + sides + transition merged into one block -->
  <rect x="0" y="0" width="65" height="10" fill="#023E5B"/>
  <!-- Upper columns -->
  <rect x="0" y="10" width="5" height="15" fill="#023E5B"/>
  <rect x="10" y="10" width="5" height="15" fill="#023E5B"/>
  <rect x="17.5" y="10" width="30" height="15" fill="#023E5B"/>
  <rect x="52.5" y="10" width="5" height="15" fill="#023E5B"/>
  <rect x="60" y="10" width="5" height="15" fill="#023E5B"/>
  <!-- Arch apex: center splits into two halves with gap between -->
  <rect x="0" y="25" width="5" height="5" fill="#023E5B"/>
  <rect x="10" y="25" width="5" height="5" fill="#023E5B"/>
  <rect x="17.5" y="25" width="7.5" height="5" fill="#023E5B"/>
  <rect x="40" y="25" width="7.5" height="5" fill="#023E5B"/>
  <rect x="52.5" y="25" width="5" height="5" fill="#023E5B"/>
  <rect x="60" y="25" width="5" height="5" fill="#023E5B"/>
  <!-- Arch base: outer sides + center block only -->
  <rect x="0" y="30" width="5" height="5" fill="#023E5B"/>
  <rect x="22.5" y="30" width="20" height="5" fill="#023E5B"/>
  <rect x="60" y="30" width="5" height="5" fill="#023E5B"/>
  <!-- Lower columns -->
  <rect x="0" y="35" width="5" height="20" fill="#023E5B"/>
  <rect x="10" y="35" width="5" height="20" fill="#023E5B"/>
  <rect x="17.5" y="35" width="30" height="20" fill="#023E5B"/>
  <rect x="52.5" y="35" width="5" height="20" fill="#023E5B"/>
  <rect x="60" y="35" width="5" height="20" fill="#023E5B"/>
  <!-- Bottom section: sides + bottom bar merged -->
  <rect x="0" y="55" width="65" height="10" fill="#023E5B"/>
  <text x="77.5" y="30" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#000000">Home Partners</text>
  <text x="77.5" y="58" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" fill="#000000">of America</text>
</svg>
