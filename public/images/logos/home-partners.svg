<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 268 68">
  <!-- Outer frame: bordered rectangle, transparent interior -->
  <rect x="1.5" y="1.5" width="55" height="65" fill="none" stroke="#023E5B" stroke-width="3"/>
  <!-- Left pillar -->
  <rect x="6" y="6" width="15" height="55" fill="#023E5B"/>
  <!-- Right pillar -->
  <rect x="37" y="6" width="15" height="55" fill="#023E5B"/>
  <!-- House at top center of gap (gap runs x=21–37, center x=29) -->
  <polygon points="21,21 37,21 29,8" fill="#023E5B"/>
  <rect x="24" y="21" width="10" height="9" fill="#023E5B"/>
  <!-- Text: "Home Partners" bold black -->
  <text x="67" y="30" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#000000">Home Partners</text>
  <!-- Text: "of America" regular black -->
  <text x="67" y="57" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#000000">of America</text>
</svg>
