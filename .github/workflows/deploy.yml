name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: team_yiAPoi1shdKEYc6i9mNV9M8m
          VERCEL_PROJECT_ID: prj_yFuNZBovb0ceUiotB2ycw5SsAH3A
